name: Publish to isolated.tech

# Drops a GitHub Release's .zip asset onto isolated.tech via the @isolatedtech/cli.
#
# Setup (per app repo):
#   1. Register the app once locally:  isolated init
#   2. In GitHub repo settings add:
#        Secrets  → ISOLATED_API_KEY         (from: isolated login → copy key)
#        Secrets  → SPARKLE_ED_PRIVATE_KEY   (base64 of ~/.config/sparkle/ed25519_private.key)
#        Variables → ISOLATED_APP_SLUG      (optional; defaults to repo name)
#   3. Attach the built .zip to each GitHub Release (tag format: v1.2.3).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to republish (e.g. v1.2.3)
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @isolatedtech/cli
        run: npm install -g @isolatedtech/cli

      - name: Resolve release metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json body --jq .body > release-notes.md

      - name: Download .zip asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release
          gh release download "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern '*.zip' \
            --dir release
          ls -la release

      - name: Extract build number from zip
        id: build
        run: |
          set -euo pipefail
          ZIP=$(ls release/*.zip | head -n1)
          mkdir -p /tmp/extracted
          unzip -o -q "$ZIP" -d /tmp/extracted
          APP=$(find /tmp/extracted -type d -name "*.app" | awk '{print length, $0}' | sort -n | head -n1 | cut -d' ' -f2-)
          PLIST="$APP/Contents/Info.plist"
          BUILD=$(python3 -c "import plistlib; print(plistlib.load(open('$PLIST','rb'))['CFBundleVersion'])")
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Publish
        env:
          ISOLATED_API_KEY: ${{ secrets.ISOLATED_API_KEY }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          ZIP=$(ls release/*.zip | head -n1)
          SLUG="${{ vars.ISOLATED_APP_SLUG }}"
          SLUG="${SLUG:-${{ github.event.repository.name }}}"
          isolated publish \
            --zip "$ZIP" \
            --app-version "${{ steps.meta.outputs.version }}" \
            --build "${{ steps.build.outputs.build }}" \
            --slug "$SLUG" \
            --notes "$(cat release-notes.md)" \
            --no-bump
