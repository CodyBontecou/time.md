# SwiftLint Configuration for Timeprint

# Paths to include
included:
  - Timeprint
  - TimeprintIOS
  - TimeprintWidget
  - TimeprintDeviceActivityReport
  - TimeprintDeviceActivityMonitor
  - TimeprintTests

# Paths to exclude
excluded:
  - DerivedData
  - .build
  - Pods

# Enabled rules
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - line_length
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - nesting
  - identifier_name

# Rule configurations
large_tuple:
  warning: 4
  error: 5

function_parameter_count:
  warning: 8
  error: 10

type_name:
  min_length: 2
  max_length: 50

force_cast:
  severity: warning

force_try:
  severity: warning

# Custom rules
custom_rules:
  no_print_statements:
    name: "No Print Statements"
    regex: "\\bprint\\s*\\("
    message: "Use os_log or Logger instead of print()"
    severity: warning
    match_kinds:
      - identifier

# Reporter type
reporter: "xcode"
