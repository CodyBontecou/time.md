name = "time-md"
compatibility_date = "2026-06-02"
pages_build_output_dir = "site"

# Replace database_id with the real value from `npx wrangler d1 create time-md-commerce`
# before deploying. The preview_database_id is used for local Pages development.
[[d1_databases]]
binding = "DB"
database_name = "isolated-tech-store"
database_id = "32793cc4-3186-48c0-a2ca-74b071510ce1"
preview_database_id = "isolated-tech-store-local"

[[r2_buckets]]
binding = "RELEASE_BUCKET"
bucket_name = "time-md-releases"
preview_bucket_name = "time-md-releases-preview"
